name: Deploy Laravel React Inertia to Babbal Host

on:
  push:
    branches:
      - main  # or your default branch name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'  # Adjust this to your PHP version

    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '20'  # Adjust this to your Node.js version

    - name: Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader

    - name: Install NPM dependencies
      run: npm ci

    - name: Build assets
      run: npm run build

    - name: Generate application key
      run: php artisan key:generate

    - name: Deploy to Babbal Host
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        port: ${{ secrets.PORT }}
        source: ".,!node_modules,!tests,!.git"
        target: "/path/to/your/project/on/server"
        overwrite: true

    - name: Post-deploy actions
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        port: ${{ secrets.PORT }}
        script: |
          cd /path/to/your/project/on/server
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          # Restart your web server (e.g., PHP-FPM) or your entire web stack if necessary
          # sudo systemctl restart php8.2-fpm
          # sudo systemctl restart nginx
